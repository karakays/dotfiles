[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[general]
live_config_reload = true
# Theme: edit this single line to swap themes. Files live in ./themes/.
import = ["~/.config/alacritty/themes/kanagawa-wave.toml"]

[terminal]

# Color overrides not provided by the imported theme palette.
[colors.cursor]
text = "CellBackground"

[colors.line_indicator]
background = "#FFFFFF"
foreground = "None"

[colors.search.matches]
background = "#ffff66"
foreground = "#000000"

[colors.vi_mode_cursor]
text = "CellBackground"

[cursor]
blink_interval = 400
thickness = 0.2
unfocused_hollow = true

[cursor.style]
blinking = "Always"

[env]
TERM = "alacritty"
LANG = "en_US.UTF-8"

[font]
size = 14
normal = { family ="JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font Mono", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font Mono", style = "Bold Italic" }

[font.offset]
x = 0
y = 0

[selection]
save_to_clipboard = false

[terminal.shell]
args = ["--login"]
program = "/bin/zsh"

[window]
dynamic_padding = true
startup_mode = "Maximized"
opacity = 0.95

[window.padding]
x = 0
y = 0

[mouse]
